<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAlerta - Dashboard</title>
    <link rel="icon" href="img/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Estilos específicos de navegación Web */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .user-profile-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            object-fit: cover;
        }
        .dropdown-menu {
            position: absolute;
            top: 55px;
            right: 0;
            width: 180px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem 0;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown-item {
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.875rem;
            cursor: pointer;
        }
        .dropdown-item:hover {
            background-color: var(--input-bg);
            color: var(--accent-primary);
        }
        .dashboard-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .alert-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 2rem;
        }
    </style>
</head>
<body> <!-- Nota: El dashboard NO lleva la clase auth-page -->

<nav class="navbar">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-weight: 800; font-size: 1.25rem; color: var(--text-main);">GeoAlerta</span>
    </div>

    <div class="user-profile-menu" id="userMenuBtn">
        <span id="navUserName">Cargando...</span>
        <img id="navAvatar" src="" class="user-avatar" alt="Avatar">

        <div class="dropdown-menu hidden" id="profileDropdown">
            <a href="perfil.html" class="dropdown-item">
                <i class="fa-solid fa-user-gear"></i> Editar Perfil
            </a>
            <div class="dropdown-item" id="btnLogout" style="border-top: 1px solid var(--border-color);">
                <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
            </div>
        </div>
    </div>
</nav>

<main class="dashboard-content">
    <h1>Bienvenido, <span id="dashWelcomeName" style="color: var(--accent-primary);">Usuario</span></h1>

    <div class="alert-box">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 2rem; color: var(--accent-primary);"></i>
        <div>
            <h3 style="margin-bottom: 4px;">Centro de Monitoreo Activo</h3>
            <p style="color: var(--text-muted); font-size: 0.875rem;">El sistema de alertas georreferenciadas se encuentra listo en tu zona.</p>
        </div>
    </div>
</main>

<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        const usuarioStr = localStorage.getItem('usuario');
        if (!token || !usuarioStr) {
            window.location.href = "login.html";
            return;
        }

        const usuario = JSON.parse(usuarioStr);
        document.getElementById('dashWelcomeName').innerText = usuario.nombre;
        document.getElementById('navUserName').innerText = `${usuario.nombre}`;

        const fallback = `https://ui-avatars.com/api/?name=${usuario.nombre}+${usuario.apellido}&background=ef4444&color=fff`;
        document.getElementById('navAvatar').src = usuario.foto_url || (usuario.foto_perfil ? (usuario.foto_perfil.startsWith('data:') ? usuario.foto_perfil : `data:image/jpeg;base64,${usuario.foto_perfil}`) : fallback);
    });

    const menuBtn = document.getElementById('userMenuBtn');
    const dropdown = document.getElementById('profileDropdown');

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
    });

    document.addEventListener('click', () => dropdown.classList.add('hidden'));
    document.getElementById('btnLogout').addEventListener('click', logout);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenia - Registro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .app-logo {
            display: block;
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem auto;
            object-fit: contain;
        }
    </style>
</head>
<body style="justify-content: center; align-items: center; padding: 1rem;">

<div class="auth-container">

    <img src="img/logo.png" alt="Serenia Logo" class="app-logo">

    <h2 style="text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem;">Crear Cuenta</h2>

    <form id="registerForm">
        <div class="form-group">
            <label for="regNombre">Nombre</label>
            <input type="text" id="regNombre" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="regApellido">Apellido</label>
            <input type="text" id="regApellido" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="regEmail">Correo Electrónico</label>
            <input type="email" id="regEmail" class="form-control" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-group">
            <label for="regFecha">Fecha de Nacimiento</label>
            <input type="date" id="regFecha" class="form-control">
        </div>

        <!-- Campo de Contraseña Original -->
        <div class="form-group" style="position: relative;">
            <label for="regPassword">Contraseña</label>
            <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
            <button type="button" class="toggle-password" data-target="regPassword" style="position: absolute; right: 10px; top: 32px; background: none; border: none; color: var(--text-muted);">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <!-- NUEVO: Confirmar Contraseña -->
        <div class="form-group" style="position: relative;">
            <label for="regPasswordConfirm">Confirmar Contraseña</label>
            <input type="password" id="regPasswordConfirm" class="form-control" placeholder="••••••••" required>
            <button type="button" class="toggle-password" data-target="regPasswordConfirm" style="position: absolute; right: 10px; top: 32px; background: none; border: none; color: var(--text-muted);">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <button type="submit" class="btn btn-primary">Registrarse</button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
        <p style="color: var(--text-muted);">¿Ya tienes cuenta? <a href="login.html" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Inicia Sesión</a></p>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', handleRegister);
</script>
</body>
</html>
